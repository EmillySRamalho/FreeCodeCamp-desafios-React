<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Shopping Cart Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-sky-700 min-h-screen flex items-center justify-center p-6">

    <div id="shopping-cart-container"
      class="bg-white rounded-2xl shadow-2xl p-8 flex flex-col lg:flex-row gap-10 max-w-4xl w-full">

      <div class="flex-1">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Nossos Produtos</h2>

        <div id="products-container" class="space-y-4">

          <div class="card flex justify-between items-center bg-gray-50 p-4 rounded-xl shadow-sm">
            <div>
              <h2 class="text-xl font-semibold text-gray-700">Sapato</h2>
              <p class="text-sm text-gray-500">Quantidade: 150</p>
              <p class="text-sm text-gray-500">Preço: R$300</p>
            </div>

            <button class="remove-button bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg transition">
              Remove
            </button>
          </div>

          <div class="card flex justify-between items-center bg-gray-50 p-4 rounded-xl shadow-sm">
            <div>
              <h2 class="text-xl font-semibold text-gray-700">Bolsa</h2>
              <p class="text-sm text-gray-500">Quantidade: 10</p>
              <p class="text-sm text-gray-500">Preço: R$1.500</p>
            </div>

            <button class="remove-button bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg transition">
              Remove
            </button>
          </div>

        </div>
      </div>

      <!-- Resumo -->
      <div id="order-summary-container"
        class="bg-gray-50 p-6 rounded-xl border w-full lg:w-72 shadow-md flex flex-col gap-4">

        <h2 class="text-lg font-bold text-gray-800">Order Summary</h2>

        <div class="flex justify-between text-gray-600">
          <span>Total:</span>
          <span id="total-amount" class="font-semibold text-gray-800">R$3.000</span>
        </div>

        <a href="#"
          class="text-center bg-blue-600 hover:bg-blue-500 text-white font-semibold p-3 rounded-lg transition">
          Checkout
        </a>

      </div>

    </div>

  </body>
</html>
